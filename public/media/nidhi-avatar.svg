<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity=".15"/>
      <stop offset="100%" stop-color="#0a0e22" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8c49a"/>
      <stop offset="100%" stop-color="#d4a574"/>
    </linearGradient>
    <linearGradient id="hairGrad" x1="0" y1="0" x2=".3" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#1a1020"/>
    </linearGradient>
    <linearGradient id="dressGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1a3a"/>
      <stop offset="100%" stop-color="#1a0f28"/>
    </linearGradient>
    <linearGradient id="bangleGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbe6b4"/>
      <stop offset="50%" stop-color="#e8c46a"/>
      <stop offset="100%" stop-color="#c79a36"/>
    </linearGradient>
    <linearGradient id="bangleRose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8a090"/>
      <stop offset="100%" stop-color="#c47060"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="warmGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background glow -->
  <circle cx="150" cy="160" r="160" fill="url(#bgGlow)"/>

  <!-- hair back (long flowing) -->
  <g class="hair-back">
    <path d="M90,130 Q80,180 75,250 Q72,300 85,360 Q90,380 100,390 L105,380 Q92,320 90,260 Q88,200 100,140Z" fill="url(#hairGrad)" opacity=".9">
      <animate attributeName="d" dur="4s" repeatCount="indefinite" values="
        M90,130 Q80,180 75,250 Q72,300 85,360 Q90,380 100,390 L105,380 Q92,320 90,260 Q88,200 100,140Z;
        M90,130 Q78,185 73,255 Q70,305 82,365 Q88,385 98,392 L103,382 Q90,325 88,265 Q86,205 100,140Z;
        M90,130 Q80,180 75,250 Q72,300 85,360 Q90,380 100,390 L105,380 Q92,320 90,260 Q88,200 100,140Z
      "/>
    </path>
    <path d="M210,130 Q220,180 225,250 Q228,300 215,360 Q210,380 200,390 L195,380 Q208,320 210,260 Q212,200 200,140Z" fill="url(#hairGrad)" opacity=".9">
      <animate attributeName="d" dur="4.5s" repeatCount="indefinite" values="
        M210,130 Q220,180 225,250 Q228,300 215,360 Q210,380 200,390 L195,380 Q208,320 210,260 Q212,200 200,140Z;
        M210,130 Q222,185 227,255 Q230,305 218,365 Q212,385 202,392 L197,382 Q210,325 212,265 Q214,205 200,140Z;
        M210,130 Q220,180 225,250 Q228,300 215,360 Q210,380 200,390 L195,380 Q208,320 210,260 Q212,200 200,140Z
      "/>
    </path>
    <!-- center back hair -->
    <path d="M105,120 Q100,200 105,300 Q108,350 115,385 L125,380 Q115,340 112,290 Q108,220 115,130Z" fill="url(#hairGrad)" opacity=".7"/>
    <path d="M195,120 Q200,200 195,300 Q192,350 185,385 L175,380 Q185,340 188,290 Q192,220 185,130Z" fill="url(#hairGrad)" opacity=".7"/>
  </g>

  <!-- neck -->
  <path d="M130,210 Q132,235 133,255 L167,255 Q168,235 170,210" fill="url(#skinGrad)"/>

  <!-- shoulders & dress -->
  <path d="M133,252 Q110,258 80,275 Q60,288 55,310 L55,400 L245,400 L245,310 Q240,288 220,275 Q190,258 167,252Z" fill="url(#dressGrad)" stroke="#3a2050" stroke-width=".5"/>
  <!-- dress neckline detail -->
  <path d="M133,252 Q140,260 150,262 Q160,260 167,252" fill="none" stroke="#d4af37" stroke-width="1" opacity=".5"/>

  <!-- face -->
  <ellipse cx="150" cy="170" rx="52" ry="62" fill="url(#skinGrad)"/>

  <!-- eyes -->
  <g class="eyes">
    <!-- left eye -->
    <ellipse cx="132" cy="165" rx="8" ry="5.5" fill="#fff" opacity=".95"/>
    <circle cx="133" cy="165" r="3.5" fill="#1a0f0a"/>
    <circle cx="134" cy="163.5" r="1.2" fill="#fff" opacity=".8"/>
    <!-- right eye -->
    <ellipse cx="168" cy="165" rx="8" ry="5.5" fill="#fff" opacity=".95"/>
    <circle cx="167" cy="165" r="3.5" fill="#1a0f0a"/>
    <circle cx="168" cy="163.5" r="1.2" fill="#fff" opacity=".8"/>
    <!-- eyelashes -->
    <path d="M124,162 Q128,158 132,161" fill="none" stroke="#1a0f0a" stroke-width="1.2"/>
    <path d="M168,161 Q172,158 176,162" fill="none" stroke="#1a0f0a" stroke-width="1.2"/>
    <!-- eyebrows -->
    <path d="M122,155 Q132,149 142,154" fill="none" stroke="#2a1a10" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M158,154 Q168,149 178,155" fill="none" stroke="#2a1a10" stroke-width="1.8" stroke-linecap="round"/>
    <!-- blink animation -->
    <animate attributeName="opacity" dur="4s" repeatCount="indefinite" values="1;1;1;0;1;1;1;1;1;1" keyTimes="0;0.43;0.45;0.47;0.49;0.5;0.93;0.95;0.97;1"/>
  </g>

  <!-- nose -->
  <path d="M148,170 Q150,180 148,185 Q150,187 153,185" fill="none" stroke="#c49070" stroke-width="1.2" stroke-linecap="round"/>

  <!-- smile -->
  <path d="M135,192 Q142,202 150,204 Q158,202 165,192" fill="none" stroke="#b07060" stroke-width="1.8" stroke-linecap="round">
    <animate attributeName="d" dur="6s" repeatCount="indefinite" values="
      M135,192 Q142,202 150,204 Q158,202 165,192;
      M136,193 Q143,204 150,206 Q157,204 164,193;
      M135,192 Q142,202 150,204 Q158,202 165,192
    "/>
  </path>
  <!-- lower lip hint -->
  <path d="M140,197 Q150,208 160,197" fill="#c48070" opacity=".3"/>

  <!-- blush -->
  <circle cx="125" cy="188" r="10" fill="#e8a090" opacity=".2">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" values=".15;.25;.15"/>
  </circle>
  <circle cx="175" cy="188" r="10" fill="#e8a090" opacity=".2">
    <animate attributeName="opacity" dur="3s" repeatCount="indefinite" values=".15;.25;.15"/>
  </circle>

  <!-- bindi -->
  <circle cx="150" cy="148" r="2.5" fill="#c41030">
    <animate attributeName="r" dur="3s" repeatCount="indefinite" values="2.5;2.8;2.5"/>
  </circle>

  <!-- hair front -->
  <g class="hair-front">
    <!-- top hair volume -->
    <path d="M98,140 Q95,115 105,95 Q120,72 150,68 Q180,72 195,95 Q205,115 202,140 Q195,120 180,110 Q165,105 150,104 Q135,105 120,110 Q105,120 98,140Z" fill="url(#hairGrad)"/>
    <!-- left side hair -->
    <path d="M98,140 Q92,155 88,175 Q86,190 88,200 Q92,190 95,175 Q98,160 102,145Z" fill="url(#hairGrad)">
      <animate attributeName="d" dur="5s" repeatCount="indefinite" values="
        M98,140 Q92,155 88,175 Q86,190 88,200 Q92,190 95,175 Q98,160 102,145Z;
        M98,140 Q90,157 86,178 Q84,193 86,203 Q90,193 93,178 Q96,163 102,145Z;
        M98,140 Q92,155 88,175 Q86,190 88,200 Q92,190 95,175 Q98,160 102,145Z
      "/>
    </path>
    <!-- right side hair -->
    <path d="M202,140 Q208,155 212,175 Q214,190 212,200 Q208,190 205,175 Q202,160 198,145Z" fill="url(#hairGrad)">
      <animate attributeName="d" dur="4.8s" repeatCount="indefinite" values="
        M202,140 Q208,155 212,175 Q214,190 212,200 Q208,190 205,175 Q202,160 198,145Z;
        M202,140 Q210,157 214,178 Q216,193 214,203 Q210,193 207,178 Q204,163 198,145Z;
        M202,140 Q208,155 212,175 Q214,190 212,200 Q208,190 205,175 Q202,160 198,145Z
      "/>
    </path>
    <!-- hair parting highlight -->
    <path d="M142,70 Q150,68 155,70 Q152,85 150,100 Q148,85 142,70Z" fill="#2a2040" opacity=".4"/>
    <!-- hair sheen -->
    <path d="M120,85 Q135,78 145,80 Q140,95 135,105 Q130,95 120,85Z" fill="#fff" opacity=".06"/>
  </g>

  <!-- left arm resting (chin on hand pose) -->
  <g class="left-arm">
    <path d="M80,275 Q75,290 78,310 Q80,330 85,340 L95,335 Q90,320 88,305 Q86,290 90,275Z" fill="url(#dressGrad)"/>
    <!-- hand near chin -->
    <path d="M108,200 Q100,208 98,218 Q97,225 100,230 Q104,228 106,222 Q108,215 112,208Z" fill="url(#skinGrad)"/>
  </g>

  <!-- bangles on left wrist with sparkle -->
  <g class="bangles" filter="url(#softGlow)">
    <ellipse cx="100" cy="232" rx="10" ry="4" fill="none" stroke="url(#bangleGold)" stroke-width="2.5">
      <animate attributeName="stroke-opacity" dur="2s" repeatCount="indefinite" values=".8;1;.8"/>
    </ellipse>
    <ellipse cx="100" cy="238" rx="10" ry="4" fill="none" stroke="url(#bangleRose)" stroke-width="2.2"/>
    <ellipse cx="100" cy="244" rx="10" ry="4" fill="none" stroke="url(#bangleGold)" stroke-width="2">
      <animate attributeName="stroke-opacity" dur="2.5s" repeatCount="indefinite" values=".7;1;.7"/>
    </ellipse>
    <!-- sparkle on bangle -->
    <circle cx="110" cy="232" r="2" fill="#fbe6b4" opacity="0">
      <animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="0;0;.9;0;0"/>
      <animate attributeName="r" dur="3s" repeatCount="indefinite" values="1;1;3;1;1"/>
    </circle>
    <circle cx="91" cy="244" r="2" fill="#fbe6b4" opacity="0">
      <animate attributeName="opacity" dur="3.5s" repeatCount="indefinite" values="0;.8;0;0;.6;0"/>
      <animate attributeName="r" dur="3.5s" repeatCount="indefinite" values="1;3;1;1;2.5;1"/>
    </circle>
  </g>

  <!-- floating hearts around her -->
  <g class="floating-decor" opacity=".6">
    <text x="55" y="100" font-size="14" fill="#f7c3cd">
      &#x2764;
      <animateTransform attributeName="transform" type="translate" dur="4s" repeatCount="indefinite" values="0,0; 5,-15; 0,0"/>
      <animate attributeName="opacity" dur="4s" repeatCount="indefinite" values=".4;.8;.4"/>
    </text>
    <text x="235" y="120" font-size="12" fill="#e8c46a">
      &#x2764;
      <animateTransform attributeName="transform" type="translate" dur="3.5s" repeatCount="indefinite" values="0,0; -5,-12; 0,0"/>
      <animate attributeName="opacity" dur="3.5s" repeatCount="indefinite" values=".3;.7;.3"/>
    </text>
    <text x="40" y="300" font-size="10" fill="#f0d98a">
      &#10022;
      <animate attributeName="opacity" dur="2.5s" repeatCount="indefinite" values=".2;.8;.2"/>
    </text>
    <text x="250" y="280" font-size="11" fill="#f0d98a">
      &#10022;
      <animate attributeName="opacity" dur="3s" repeatCount="indefinite" values=".3;.9;.3"/>
    </text>
  </g>
</svg>